# NOTE: Update the repo URL below to point to your fork before connecting this service in Render.
version: "1"
services:
  - type: web
    name: hubspot-recommendation-tool
    runtime: docker
    repo: https://github.com/SerenePrince/hubspot-recommendation-tool
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        sync: false
      # Auth is off by default (AUTH_ENABLED=0 in the Dockerfile).
      # To enable: add AUTH_ENABLED=1, AUTH_USERNAME, and AUTH_PASSWORD as
      # secret environment variables in the Render dashboard.
    region: oregon
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
